			// var data = HeaderData;
			return m("a", {href: link.url}, [
				m('h2.post-title', ctrl.h2posttitle),

				m('p.post-meta', ctrl.ppostmetadate),

	var CarouselItem = {
		controller: function (data) {
			// console.log(data);
			return data;
		},
		view: function (ctrl, config) {
			var item3 = ctrl.item.active ? '.item.active' : '.item';
			return m(item3, [
				m('h3', ctrl.item.header),
				m('img.center-block', {src: ctrl.item.img}),
				m('.carousel-caption', ctrl.item.caption)
			])
		}
	};

	var CarouselIndicator = {
		controller: function (data) {
			return data;
		},
		view: function (ctrl, config) {
			var item2 = ctrl.item.active ? 'li.active' : 'li';
			return m(item2, {"data-target": '#' + ctrl.carouselId, "data-slide-to": ctrl.index});
		}
	};

	var CarouselComponent = {
		controller: function (data) {
			// console.log(data);
			// controller is called once
			// typically you put stateful info here.
			// e.g. some static array of data [1, 2, 3]
		},
		onInit: function (el, isInitialized) {
			if (isInitialized) return;
			console.log('initializing carousel...');
			// what does the $('.carousel') have to do with
			$('.carousel', el).carousel({
				interval: false
			});
		},
		view: function (ctrl, config) {  // config param is CarouselData in this case.
			var carousel = 'div[id=' + config.id + '].carousel.slide';
			return m(carousel, {
				config: this.onInit
			}, [
				m('ol.carousel-indicators',
					config.component.map(function (it, index) {
						return m.component(CarouselIndicator, {item: it, carouselId: config.id, index: index})
					})
				),
