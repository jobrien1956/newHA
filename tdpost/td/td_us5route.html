<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="initial-scale=1.0, user-scalable=no">
	<meta charset="utf-8">
	<title>GDMBR map sections</title>
	<style>
		html, body, #map-canvas {
			height: 100%;
			margin: 0px;
			padding: 0px
		}
	</style>
	<script src="https://maps.googleapis.com/maps/api/js?v=3.exp&signed_in=true"></script>
	<script>
		// This example adds a purple rectangle to a map.

		function initialize() {
			var map = new google.maps.Map(document.getElementById('map-canvas'), {
				zoom: 5,
				center: new google.maps.LatLng(36.66, -106.55),
				mapTypeId: google.maps.MapTypeId.TERRAIN
			});

			var rectangle5A = new google.maps.Rectangle({
				strokeColor: '#9127AB',
				strokeOpacity: 0.8,
				strokeWeight: 3,
				fillColor: '#F9F5FA',
				fillOpacity: 0.1,
				map: map,
				bounds: new google.maps.LatLngBounds(
					new google.maps.LatLng(37.37542, -107.01193),
					new google.maps.LatLng(35.95976, -106.05436))
			});

			var rectangle5B = new google.maps.Rectangle({
				strokeColor: '#9127AB',
				strokeOpacity: 0.8,
				strokeWeight: 3,
				fillColor: '#F9F5FA',
				fillOpacity: 0.1,
				map: map,
				bounds: new google.maps.LatLngBounds(
					new google.maps.LatLng(36.07051, -108.149),
					new google.maps.LatLng(34.293, -106.95911))
			});

			var ctaLayer = new google.maps.KmlLayer({
				url: "http://www.havingadventures.com/kml/US5_just_route.kml"
			});
			ctaLayer.setMap(map);

		}

		google.maps.event.addDomListener(window, 'load', initialize);

	</script>
</head>
<body>
<div id="map-canvas"></div>
</body>
</html>
